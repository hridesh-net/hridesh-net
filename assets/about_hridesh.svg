<svg viewBox="0 0 760 520" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0221"/>
      <stop offset="0.55" stop-color="#1a1b3a"/>
      <stop offset="1" stop-color="#241b4a"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd319"/>
      <stop offset="0.35" stop-color="#ff901f"/>
      <stop offset="0.65" stop-color="#f72585"/>
      <stop offset="1" stop-color="#7209b7"/>
    </linearGradient>
    <linearGradient id="gridfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4cc9f0" stop-opacity="0"/>
      <stop offset="1" stop-color="#4cc9f0" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="botbody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b3f6b"/>
      <stop offset="1" stop-color="#23244a"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- horizontal slices for the synthwave sun -->
    <mask id="sunmask">
      <rect x="380" y="60" width="300" height="300" fill="white"/>
      <rect x="380" y="196" width="300" height="7" fill="black"/>
      <rect x="380" y="216" width="300" height="9" fill="black"/>
      <rect x="380" y="238" width="300" height="11" fill="black"/>
      <rect x="380" y="263" width="300" height="13" fill="black"/>
    </mask>
    <style>
      .float { animation: float 4s ease-in-out infinite; }
      @keyframes float { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-14px); } }
      .blink { animation: blink 3.5s infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes blink { 0%,92%,100% { transform: scaleY(1); } 95% { transform: scaleY(0.08); } }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
      .twinkle1 { animation: pulse 2.6s ease-in-out infinite; }
      .twinkle2 { animation: pulse 3.4s ease-in-out 0.8s infinite; }
      .twinkle3 { animation: pulse 4.2s ease-in-out 1.6s infinite; }
      .cursor { animation: cur 1s step-end infinite; }
      @keyframes cur { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
      .petal1 { animation: fall1 9s linear infinite; }
      .petal2 { animation: fall2 12s linear 2s infinite; }
      .petal3 { animation: fall3 10s linear 4s infinite; }
      .petal4 { animation: fall1 11s linear 6s infinite; }
      .petal5 { animation: fall2 13s linear 1s infinite; }
      @keyframes fall1 { 0% { transform: translate(0,-40px) rotate(0deg); opacity:0; } 8% { opacity:0.9; } 90% { opacity:0.9; } 100% { transform: translate(-90px,560px) rotate(320deg); opacity:0; } }
      @keyframes fall2 { 0% { transform: translate(0,-40px) rotate(0deg); opacity:0; } 8% { opacity:0.9; } 90% { opacity:0.9; } 100% { transform: translate(70px,560px) rotate(-280deg); opacity:0; } }
      @keyframes fall3 { 0% { transform: translate(0,-40px) rotate(0deg); opacity:0; } 8% { opacity:0.9; } 90% { opacity:0.9; } 100% { transform: translate(-40px,560px) rotate(400deg); opacity:0; } }
      .scan { animation: scan 6s linear infinite; }
      @keyframes scan { 0% { transform: translateY(-520px); } 100% { transform: translateY(520px); } }
      .ring { animation: ring 3s ease-in-out infinite; transform-origin: 530px 210px; }
      @keyframes ring { 0%,100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.06); opacity: 0.15; } }
      .typeline { animation: type 6s steps(30) infinite; }
      @keyframes type { 0% { width: 0; } 45%,100% { width: 210px; } }
    </style>
  </defs>

  <!-- ══════ SKY ══════ -->
  <rect width="760" height="520" fill="url(#sky)" rx="16"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle class="twinkle1" cx="80" cy="60" r="2"/>
    <circle class="twinkle2" cx="180" cy="110" r="1.5"/>
    <circle class="twinkle3" cx="290" cy="50" r="2"/>
    <circle class="twinkle2" cx="380" cy="90" r="1.4"/>
    <circle class="twinkle1" cx="60" cy="180" r="1.6"/>
    <circle class="twinkle3" cx="700" cy="70" r="2"/>
    <circle class="twinkle1" cx="640" cy="130" r="1.4"/>
    <circle class="twinkle2" cx="130" cy="250" r="1.5"/>
    <circle class="twinkle3" cx="240" cy="170" r="1.3"/>
    <circle class="twinkle1" cx="480" cy="55" r="1.6"/>
  </g>

  <!-- ══════ SYNTHWAVE SUN ══════ -->
  <circle class="ring" cx="530" cy="210" r="130" fill="none" stroke="#f72585" stroke-width="2" opacity="0.5"/>
  <g mask="url(#sunmask)">
    <circle cx="530" cy="210" r="115" fill="url(#sun)" filter="url(#bigglow)"/>
  </g>

  <!-- ══════ SKYLINE ══════ -->
  <g fill="#160b2e">
    <rect x="330" y="255" width="34" height="105"/>
    <rect x="370" y="230" width="26" height="130"/>
    <rect x="402" y="270" width="40" height="90"/>
    <rect x="448" y="240" width="30" height="120"/>
    <rect x="484" y="285" width="46" height="75"/>
    <rect x="536" y="250" width="28" height="110"/>
    <rect x="570" y="225" width="36" height="135"/>
    <rect x="612" y="270" width="30" height="90"/>
    <rect x="648" y="245" width="42" height="115"/>
    <rect x="696" y="280" width="34" height="80"/>
  </g>
  <!-- lit windows -->
  <g fill="#f72585" opacity="0.9">
    <rect class="twinkle2" x="376" y="242" width="5" height="5"/>
    <rect class="twinkle1" x="386" y="258" width="5" height="5"/>
    <rect class="twinkle3" x="455" y="252" width="5" height="5"/>
    <rect class="twinkle1" x="578" y="240" width="5" height="5"/>
    <rect class="twinkle2" x="592" y="262" width="5" height="5"/>
    <rect class="twinkle3" x="656" y="258" width="5" height="5"/>
  </g>
  <g fill="#4cc9f0" opacity="0.9">
    <rect class="twinkle3" x="410" y="280" width="5" height="5"/>
    <rect class="twinkle2" x="425" y="296" width="5" height="5"/>
    <rect class="twinkle1" x="545" y="262" width="5" height="5"/>
    <rect class="twinkle3" x="620" y="282" width="5" height="5"/>
    <rect class="twinkle1" x="702" y="292" width="5" height="5"/>
  </g>

  <!-- ══════ PERSPECTIVE GRID FLOOR ══════ -->
  <g stroke="url(#gridfade)" stroke-width="1.2" opacity="0.8">
    <line x1="0" y1="380" x2="760" y2="380"/>
    <line x1="0" y1="404" x2="760" y2="404"/>
    <line x1="0" y1="434" x2="760" y2="434"/>
    <line x1="0" y1="472" x2="760" y2="472"/>
    <line x1="380" y1="360" x2="380" y2="520"/>
    <line x1="380" y1="360" x2="230" y2="520"/>
    <line x1="380" y1="360" x2="80" y2="520"/>
    <line x1="380" y1="360" x2="-100" y2="520"/>
    <line x1="380" y1="360" x2="530" y2="520"/>
    <line x1="380" y1="360" x2="680" y2="520"/>
    <line x1="380" y1="360" x2="860" y2="520"/>
  </g>
  <line x1="0" y1="360" x2="760" y2="360" stroke="#f72585" stroke-width="2" filter="url(#glow)"/>

  <!-- ══════ TORII GATE ══════ -->
  <g stroke="#f72585" stroke-width="7" stroke-linecap="round" fill="none" filter="url(#glow)">
    <path d="M 58 358 L 62 240"/>
    <path d="M 178 358 L 174 240"/>
    <path d="M 38 246 Q 118 226 198 246"/>
    <path d="M 52 270 L 184 270"/>
    <path d="M 118 270 L 118 244"/>
  </g>

  <!-- ══════ CHIBI AI BOT ══════ -->
  <g class="float">
    <!-- shadow -->
    <ellipse cx="270" cy="352" rx="46" ry="7" fill="#4cc9f0" opacity="0.25"/>
    <!-- antenna -->
    <line x1="270" y1="196" x2="270" y2="176" stroke="#8d99ae" stroke-width="4"/>
    <circle class="pulse" cx="270" cy="170" r="7" fill="#f72585" filter="url(#glow)"/>
    <!-- head -->
    <rect x="222" y="196" width="96" height="74" rx="24" fill="url(#botbody)" stroke="#4cc9f0" stroke-width="2.5"/>
    <!-- face screen -->
    <rect x="236" y="210" width="68" height="46" rx="14" fill="#0d0221"/>
    <!-- eyes (anime crescent happy eyes) -->
    <g class="blink" stroke="#4cc9f0" stroke-width="5" stroke-linecap="round" fill="none" filter="url(#glow)">
      <path d="M 248 236 Q 254 228 260 236"/>
      <path d="M 280 236 Q 286 228 292 236"/>
    </g>
    <!-- blush -->
    <circle cx="245" cy="246" r="4" fill="#f72585" opacity="0.75"/>
    <circle cx="295" cy="246" r="4" fill="#f72585" opacity="0.75"/>
    <!-- ear pods -->
    <rect x="212" y="220" width="12" height="26" rx="6" fill="#3b3f6b" stroke="#4cc9f0" stroke-width="2"/>
    <rect x="316" y="220" width="12" height="26" rx="6" fill="#3b3f6b" stroke="#4cc9f0" stroke-width="2"/>
    <!-- body -->
    <rect x="238" y="274" width="64" height="52" rx="18" fill="url(#botbody)" stroke="#4cc9f0" stroke-width="2.5"/>
    <!-- chest core -->
    <circle class="pulse" cx="270" cy="300" r="10" fill="none" stroke="#f72585" stroke-width="3" filter="url(#glow)"/>
    <circle cx="270" cy="300" r="3.5" fill="#f72585"/>
    <!-- arms -->
    <path d="M 238 286 Q 218 292 214 308" stroke="#4cc9f0" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M 302 286 Q 324 280 334 264" stroke="#4cc9f0" stroke-width="6" stroke-linecap="round" fill="none"/>
    <circle cx="336" cy="260" r="6" fill="#4cc9f0"/>
  </g>

  <!-- ══════ TERMINAL WINDOW ══════ -->
  <g>
    <rect x="418" y="368" width="300" height="128" rx="12" fill="#16172e" stroke="#7209b7" stroke-width="2"/>
    <rect x="418" y="368" width="300" height="26" rx="12" fill="#231f45"/>
    <rect x="418" y="384" width="300" height="10" fill="#231f45"/>
    <circle cx="436" cy="381" r="4.5" fill="#f72585"/>
    <circle cx="452" cy="381" r="4.5" fill="#ffd319"/>
    <circle cx="468" cy="381" r="4.5" fill="#4cc9f0"/>
    <text x="568" y="385" font-size="10" fill="#8d99ae" text-anchor="middle">hridesh@agent: ~</text>
    <text x="432" y="414" font-size="12" fill="#4cc9f0">$ python deploy_agents.py</text>
    <text x="432" y="434" font-size="12" fill="#8d99ae">⠿ orchestrating 4 agents...</text>
    <text x="432" y="454" font-size="12" fill="#06d6a0">✔ infra provisioned (aws)</text>
    <g>
      <text x="432" y="476" font-size="12" fill="#f72585">$ ship_it --prod</text>
      <rect class="cursor" x="546" y="466" width="8" height="12" fill="#f72585"/>
    </g>
  </g>

  <!-- ══════ KATAKANA ACCENTS ══════ -->
  <text x="712" y="150" font-size="26" fill="#4cc9f0" opacity="0.85" filter="url(#glow)" writing-mode="tb" font-family="sans-serif">エージェント</text>
  <text x="36" y="70" font-size="30" fill="#f72585" opacity="0.9" filter="url(#glow)" font-family="sans-serif">夢</text>
  <text x="36" y="96" font-size="10" fill="#8d99ae" letter-spacing="2">DREAM • BUILD • SHIP</text>

  <!-- ══════ SAKURA PETALS ══════ -->
  <g fill="#f7a1c4">
    <g class="petal1"><path d="M 140 0 q 6 -8 12 0 q -6 10 -12 0" transform="translate(0,0)"/></g>
    <g class="petal2"><path d="M 320 0 q 6 -8 12 0 q -6 10 -12 0"/></g>
    <g class="petal3"><path d="M 520 0 q 6 -8 12 0 q -6 10 -12 0"/></g>
    <g class="petal4"><path d="M 640 0 q 6 -8 12 0 q -6 10 -12 0"/></g>
    <g class="petal5"><path d="M 80 0 q 6 -8 12 0 q -6 10 -12 0"/></g>
  </g>

  <!-- scanline sweep for CRT anime feel -->
  <g class="scan" opacity="0.10">
    <rect x="0" y="0" width="760" height="46" fill="#4cc9f0"/>
  </g>

  <!-- frame -->
  <rect x="1.5" y="1.5" width="757" height="517" rx="16" fill="none" stroke="#7209b7" stroke-width="3"/>
</svg>